<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentron Smash Ultimate</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- MAIN MENU -->
    <section id="mainMenu" class="screen active">

        <h1 class="gameTitle">SENTRON SMASH ULTIMATE</h1>

        <button id="playBtn" class="menuBtn">
            PLAY
        </button>

        <button id="controlsBtn" class="menuBtn">
            CONTROLS
        </button>

    </section>

    <!-- CHARACTER SELECT -->
    <section id="characterSelect" class="screen">

        <h2>Choose Fighters</h2>

        <div class="fighterGrid">

            <div class="fighterCard" data-fighter="gojo">
                <h3>Gojo</h3>
                <p>Hollow Purple</p>
            </div>

            <div class="fighterCard" data-fighter="michael">
                <h3>Michael</h3>
                <p>Volt Blitz</p>
            </div>

            <div class="fighterCard" data-fighter="duke">
                <h3>Duke</h3>
                <p>Titan Smash</p>
            </div>

            <div class="fighterCard" data-fighter="elon">
                <h3>Elon</h3>
                <p>Asteroid Strike</p>
            </div>

            <div class="fighterCard" data-fighter="imran">
                <h3>Imran</h3>
                <p>Baruka Slice</p>
            </div>

        </div>

        <div class="selectionInfo">

            <div>
                P1:
                <span id="p1Name">None</span>
            </div>

            <div>
                P2:
                <span id="p2Name">None</span>
            </div>

        </div>

        <button id="toMapSelect" class="menuBtn">
            NEXT
        </button>

    </section>

    <!-- MAP SELECT -->
    <section id="mapSelect" class="screen">

        <h2>Select Stage</h2>

        <div class="mapGrid">

            <div class="mapCard" data-map="battlefield">
                Battlefield
            </div>

            <div class="mapCard" data-map="lava">
                Lava Core
            </div>

            <div class="mapCard" data-map="hyperion">
                Hyperion Station
            </div>

            <div class="mapCard" data-map="skyTemple">
                Sky Temple
            </div>

            <div class="mapCard" data-map="voidArena">
                Void Arena
            </div>

        </div>

        <button id="startBattleBtn" class="menuBtn">
            START BATTLE
        </button>

    </section>

    <!-- GAME SCREEN -->
    <section id="gameScreen" class="screen">

        <div id="hud">

            <div class="playerHud">

                <h3 id="hudP1Name">
                    PLAYER 1
                </h3>

                <div id="hudP1Damage">
                    0%
                </div>

                <div id="hudP1Stocks">
                    ⭐⭐⭐
                </div>

            </div>

            <div class="playerHud">

                <h3 id="hudP2Name">
                    PLAYER 2
                </h3>

                <div id="hudP2Damage">
                    0%
                </div>

                <div id="hudP2Stocks">
                    ⭐⭐⭐
                </div>

            </div>

        </div>

        <canvas
            id="gameCanvas"
            width="1280"
            height="720">
        </canvas>

    </section>

    <!-- VICTORY SCREEN -->
    <section id="victoryScreen" class="screen">

        <h1 id="winnerText">
            WINNER
        </h1>

        <button id="playAgainBtn" class="menuBtn">
            PLAY AGAIN
        </button>

    </section>

    <!-- JAVASCRIPT MODULES -->

    <script src="fighters.js"></script>
    <script src="maps.js"></script>
    <script src="effects.js"></script>
    <script src="game.js"></script>

</body>
</html>
